  <style>
    /* ===== CATEGORY CARDS ===== */
    .art-categories {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      margin-top: 40px;
    }

    .art-card {
      width: 250px;
      height: 150px;
      background: #fff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      color: #333;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .art-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .art-card {
        width: 100%;
        max-width: 300px;
      }
    }
  </style>
</head>
