  <style>
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .art-image {
      flex: 1 1 calc(33.333% - 40px);
      max-width: 300px;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    .art-image:hover {
      transform: scale(1.05);
    }

    .art-image img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .art-image {
        flex: 1 1 calc(50% - 40px);
      }
    }

    @media (max-width: 600px) {
      .art-image {
        flex: 1 1 100%;
      }
    }
  </style>
</head>
