<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Procreate Art</title>
  <link rel="stylesheet" href="css/styles.css" />

  <style>
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .art-image {
      flex: 1 1 calc(33.333% - 40px);
      max-width: 300px;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .art-image img {
      width: 100%;
      display: block;
    }

    @media (max-width: 900px) {
      .art-image {
        flex: 1 1 calc(50% - 40px);
      }
    }

    @media (max-width: 600px) {
      .art-image {
        flex: 1 1 100%;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="logo" onclick="location.href='index.html'">Sai Mounika</div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="books.html">Books</a></li>
      <li><a href="art.html">Art</a></li>
    </ul>
  </nav>
</header>

<main class="content">
  <h1>Procreate Art</h1>

  <div class="gallery">

    <div class="art-image"><img src="art_images/IMG_1260.JPG"></div>
    <!-- continue all images same -->
  </div>

</main>

<script src="js/script.js"></script>

</body>
</html>
