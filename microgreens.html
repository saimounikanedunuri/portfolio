<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Microgreens</title>
  <link rel="stylesheet" href="css/styles.css" />

  <style>
    /* 🌱 Gallery Layout (same feel as art page) */
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .garden-image {
      flex: 1 1 calc(33.333% - 40px);
      max-width: 250px; /* 👈 medium size */
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .garden-image:hover {
      transform: scale(1.05);
    }

    .garden-image img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    /* 📱 Responsive */
    @media (max-width: 900px) {
      .garden-image {
        flex: 1 1 calc(50% - 40px);
      }
    }

    @media (max-width: 600px) {
      .garden-image {
        flex: 1 1 100%;
      }
    }
  </style>
</head>

  <nav>
